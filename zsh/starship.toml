# DO NOT EDIT THIS FILE. IT IS MAINTAINED BY ANSIBLE.

scan_timeout = 10
command_timeout = 50

format = """
$status$username$hostname:$directory$git_branch$git_status$cmd_duration
$python$character"""

[username]
style_user = "bold #3a3a3a"
style_root = "bold red"
format = "[$user]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "[@](bold #af005f)[$hostname](bold 091)"
disabled = false

[directory]
truncation_length = 10000
truncate_to_repo = false
style = "bold 214"
format = "[$path]($style)"

[git_branch]
style = "bold green"
format = " on [$branch]($style)"

[git_status]
disabled = false
style = "bold red"
format = "( [$all_status$ahead_behind]($style))"
conflicted = "="
ahead = "↑"
behind = "↓"
diverged = "Ⴤ"
untracked = "?"
staged = "+"
renamed = "»"
deleted = "✖"
stashed = "s"
modified = "⚡︎"
# Optimization, to speed up state calcualtion
ignore_submodules = true

[python]
style = "bold blue"
format = "[(\\($virtualenv\\))]($style)"

[cmd_duration]
min_time = 5000
style = "bold yellow"
format = " ([⏱️  $duration ]($style))"

[character]
success_symbol = "[>](bold 237)"
error_symbol = "[>](bold 237)"

[status]
disabled = false
format = '[$status]($style) '
style = 'bold red'
