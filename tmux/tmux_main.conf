setw -g pane-base-index 1

# VIM support
set -sg escape-time 0
set-window-option -g aggressive-resize on
setw -g xterm-keys on
# NVIM support
set-option -g focus-events on
set-option -sa terminal-overrides ',xterm-256color:RGB'

# vim-tmux navigator bindings
# Smart pane switching with awareness of vim and fzf
forward_programs="view|n?vim?|fzf"

should_forward="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?($forward_programs)(diff)?$'"

bind -n C-h if-shell "$should_forward" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$should_forward" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$should_forward" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$should_forward" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$should_forward" "send-keys C-\\" "select-pane -l"

# ==============================================================================
# PURE TMUX BASED COLORING
# ==============================================================================

# ==============================================================================
# NATIVE POWERLINE RECONSTRUCTION - ALERT STATE LOGIC
#
# Background Palette:
#   Primary Bar: colour233 (Ultra-dark gray)
#   Session Segment: colour236 (Dark gray)
#   Active Accent: colour214 (Orange)
#   Alert Accent: colour214 (Orange text on existing background)

set-option -g status-bg colour233
set-option -g status-fg colour231
set-option -g status-interval 2

# Left Status: Session Name (colour236 background, black text)
set-option -g status-left "#[fg=colour232,bg=colour236,bold] #S #[fg=colour236,bg=colour233,nobold,nounderscore,noitalics]"

# Window Status (Inactive)
set-window-option -g window-status-format "#[fg=colour233,bg=colour233,nobold,nounderscore,noitalics]#[fg=colour244,bg=colour233] #I  #W #[fg=colour233,bg=colour233,nobold,nounderscore,noitalics]"

# Window Status (Active): Orange background
set-window-option -g window-status-current-format "#[fg=colour233,bg=colour214,nobold,nounderscore,noitalics]#[fg=colour232,bg=colour214,bold] #I  #W #[fg=colour214,bg=colour233,nobold,nounderscore,noitalics]"

# Window Status (Alert): Orange text, retains background
set-window-option -g window-status-activity-style fg=colour214,bg=colour233,none

# Right Status: CPU/Mem Load <- Hostname
set-option -g status-right "#[fg=colour236,bg=colour233,nobold,nounderscore,noitalics]#[fg=colour250,bg=colour236] #(tmux-mem-cpu-load --interval 2) #[fg=colour214,bg=colour236,nobold,nounderscore,noitalics]#[fg=colour232,bg=colour214,bold] #H "

# ==============================================================================
# SET WINDOW COLORING ON ALERT
#
# Enable monitoring
set-window-option -g monitor-activity on
set-window-option -g visual-activity off

# Base style for inactive windows
set-window-option -g window-status-style fg=colour244,bg=colour233

# Activity style (the override)
set-window-option -g window-status-activity-style fg=colour214,bg=colour233,bold

# Format definition (using defaults to allow style overrides)
set-window-option -g window-status-format "#[fg=colour233,bg=colour233,nobold,nounderscore,noitalics]#[fg=default,bg=colour233] #I  #W #[fg=colour233,bg=colour233,nobold,nounderscore,noitalics]"

# Keep current format distinct to avoid style bleed
set-window-option -g window-status-current-format "#[fg=colour233,bg=colour214,nobold,nounderscore,noitalics]#[fg=colour232,bg=colour214,bold] #I  #W #[fg=colour214,bg=colour233,nobold,nounderscore,noitalics]"


# ==============================================================================
# CONDITIONAL SESSION INDICATOR (PREFIX ACTIVE)
#
# Logic: If prefix is active, set session block bg=colour214 (orange) and fg=colour232 (black).
# Otherwise, default to bg=colour236 (dark gray) and fg=colour232 (black).

set-option -g status-left "#{?client_prefix,#[fg=colour232 bg=colour214 bold],#[fg=colour232 bg=colour236 bold]} #S #{?client_prefix,#[fg=colour214 bg=colour233],#[fg=colour236 bg=colour233]}"

# Remainder of UI (consistent with previous state)
set-option -g status-bg colour233
set-option -g status-fg colour231
set-option -g status-interval 2

set-window-option -g monitor-activity on
set-window-option -g window-status-style fg=colour244,bg=colour233
set-window-option -g window-status-activity-style fg=colour214,bg=colour233,bold

set-window-option -g window-status-format "#[fg=colour233,bg=colour233,nobold,nounderscore,noitalics]#[fg=default,bg=colour233] #I  #W #[fg=colour233,bg=colour233,nobold,nounderscore,noitalics]"
set-window-option -g window-status-current-format "#[fg=colour233,bg=colour214,nobold,nounderscore,noitalics]#[fg=colour232,bg=colour214,bold] #I  #W #[fg=colour214,bg=colour233,nobold,nounderscore,noitalics]"
